<div class="ae-container-fluid ae-container-fluid--inner">
    <div class="ae-grid au-xs-ta-center au-mb-4">
        <div class="ae-grid__item item-lg-8 item-lg--offset-2">
            <h2 class="ae-u-bolder">Resultados de búsqueda</h2>
            <p *ngIf="term">Mostrando coincidencias para {{ term }}.</p>
            <p *ngIf="!term">Escribe un término en la barra superior para filtrar proyectos.</p>
        </div>
    </div>

    <div *ngIf="products.length > 0; else noResults" class="ae-masonry ae-masonry-md-2 ae-masonry-xl-4">
            <a *ngFor="let product of products" [routerLink]="['/item',product.cod]" class="rk-item ae-masonry__item">
                    <img src="assets/productos/{{ product.url }}.jpg" alt="">
                    <div [routerLink]="['/item', product.cod ]" class="item-meta">
                            <h2>{{ product.titulo }}</h2>
                            <p>{{ product.categoria }}</p>
                    </div>
            </a>
        </div>

    <ng-template #noResults>
        <div class="ae-grid au-xs-ta-center au-mb-4">
            <div class="ae-grid__item item-lg-8 item-lg--offset-2">
                <p>No hay resultados para ese término.</p>
            </div>
        </div>
    </ng-template>
</div>
